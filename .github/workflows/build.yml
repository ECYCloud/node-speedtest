name: Release build
# mihomo-architecture release pipeline. Builds the C++ main program on three
# platforms, bundles the matching mihomo kernel + runtime libraries + the
# webui/fonts/scripts from base/, then packages and (on tags) drafts a Release.
# The mihomo kernel version comes from MIHOMO_FALLBACK_VERSION in src/version.h.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Needed by softprops/action-gh-release to create/update the Release on tags.
permissions:
  contents: write

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  linux_amd64:
    name: Linux x86_64 (static)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read versions from version.h
        id: ver
        run: |
          MV=$(grep MIHOMO_FALLBACK_VERSION src/version.h | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          AV=$(grep '#define VERSION ' src/version.h | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          echo "mihomo=$MV" >> "$GITHUB_OUTPUT"
          echo "app=$AV" >> "$GITHUB_OUTPUT"
          echo "mihomo=$MV app=$AV"

      - name: Build main program (Alpine static)
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/work" -w /work alpine:latest \
            /bin/sh -c "apk add bash git && bash scripts/build.alpine.release.sh"

      - name: Bundle mihomo kernel
        run: |
          MV=${{ steps.ver.outputs.mihomo }}
          curl -fLO "https://github.com/MetaCubeX/mihomo/releases/download/$MV/mihomo-linux-amd64-$MV.gz"
          gunzip "mihomo-linux-amd64-$MV.gz"
          mkdir -p base/tools/clients
          install -m 0755 "mihomo-linux-amd64-$MV" base/tools/clients/mihomo

      - name: Package
        run: |
          cp -r base stairspeedtest
          chmod -R u+rwX stairspeedtest
          tar czf stairspeedtest_reborn_linux64.tar.gz stairspeedtest

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: stairspeedtest_reborn_linux64
          path: stairspeedtest_reborn_linux64.tar.gz
          if-no-files-found: error

      - name: Draft Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: stairspeedtest_reborn_linux64.tar.gz
          draft: false

  linux_arm64:
    name: Linux arm64 (static)
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v5

      - name: Read versions from version.h
        id: ver
        run: |
          MV=$(grep MIHOMO_FALLBACK_VERSION src/version.h | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          AV=$(grep '#define VERSION ' src/version.h | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          echo "mihomo=$MV" >> "$GITHUB_OUTPUT"
          echo "app=$AV" >> "$GITHUB_OUTPUT"
          echo "mihomo=$MV app=$AV"

      - name: Build main program (Alpine static)
        # 复用与 amd64 完全相同的脚本:Docker 在 ARM64 runner 上自动拉 arm64 alpine 镜像,
        # apk + 源码编译路径与架构无关。
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/work" -w /work alpine:latest \
            /bin/sh -c "apk add bash git && bash scripts/build.alpine.release.sh"

      - name: Bundle mihomo kernel
        run: |
          MV=${{ steps.ver.outputs.mihomo }}
          curl -fLO "https://github.com/MetaCubeX/mihomo/releases/download/$MV/mihomo-linux-arm64-$MV.gz"
          gunzip "mihomo-linux-arm64-$MV.gz"
          mkdir -p base/tools/clients
          install -m 0755 "mihomo-linux-arm64-$MV" base/tools/clients/mihomo

      - name: Package
        run: |
          cp -r base stairspeedtest
          chmod -R u+rwX stairspeedtest
          tar czf stairspeedtest_reborn_linux_arm64.tar.gz stairspeedtest

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: stairspeedtest_reborn_linux_arm64
          path: stairspeedtest_reborn_linux_arm64.tar.gz
          if-no-files-found: error

      - name: Draft Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: stairspeedtest_reborn_linux_arm64.tar.gz
          draft: false

  windows_amd64:
    name: Windows x86_64
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v5

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel git unzip zip
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-yaml-cpp
            mingw-w64-x86_64-libevent
            mingw-w64-x86_64-pcre2
            mingw-w64-x86_64-rapidjson
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-freetype
            mingw-w64-x86_64-harfbuzz
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-bzip2

      - name: Read mihomo version from version.h
        id: ver
        run: |
          MV=$(grep MIHOMO_FALLBACK_VERSION src/version.h | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          echo "mihomo=$MV" >> "$GITHUB_OUTPUT"

      - name: Build PNGwriter from source (not packaged in MSYS2)
        run: |
          git clone --depth 1 https://github.com/pngwriter/pngwriter.git /tmp/pngwriter
          cmake -S /tmp/pngwriter -B /tmp/pngwriter/build \
                -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/mingw64 \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build /tmp/pngwriter/build -j
          cmake --install /tmp/pngwriter/build

      - name: Build main program
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j

      - name: Assemble distribution
        run: |
          rm -rf dist
          cp -r base dist
          cp build/stairspeedtest.exe dist/
          # Bundle every non-system DLL the exe imports, from /mingw64/bin
          ldd build/stairspeedtest.exe \
            | awk '{print $3}' | grep -i '^/mingw64/bin/' | sort -u \
            | xargs -I{} cp {} dist/

      - name: Bundle mihomo kernel
        run: |
          MV=${{ steps.ver.outputs.mihomo }}
          curl -fLO "https://github.com/MetaCubeX/mihomo/releases/download/$MV/mihomo-windows-amd64-$MV.zip"
          unzip -o "mihomo-windows-amd64-$MV.zip" -d mihomo_tmp
          mkdir -p dist/tools/clients
          cp mihomo_tmp/mihomo-windows-amd64*.exe dist/tools/clients/mihomo.exe

      - name: Package
        run: |
          mv dist stairspeedtest
          zip -r stairspeedtest_reborn_win64.zip stairspeedtest

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: stairspeedtest_reborn_win64
          path: stairspeedtest_reborn_win64.zip
          if-no-files-found: error

      - name: Draft Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: stairspeedtest_reborn_win64.zip
          draft: false

  windows_arm64:
    name: Windows arm64
    runs-on: windows-11-arm
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v5

      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          install: >-
            base-devel git unzip zip
            mingw-w64-clang-aarch64-clang
            mingw-w64-clang-aarch64-lld
            mingw-w64-clang-aarch64-cmake
            mingw-w64-clang-aarch64-pkgconf
            mingw-w64-clang-aarch64-curl
            mingw-w64-clang-aarch64-openssl
            mingw-w64-clang-aarch64-yaml-cpp
            mingw-w64-clang-aarch64-libevent
            mingw-w64-clang-aarch64-pcre2
            mingw-w64-clang-aarch64-rapidjson
            mingw-w64-clang-aarch64-libpng
            mingw-w64-clang-aarch64-freetype
            mingw-w64-clang-aarch64-harfbuzz
            mingw-w64-clang-aarch64-zlib
            mingw-w64-clang-aarch64-bzip2

      - name: Read mihomo version from version.h
        id: ver
        run: |
          MV=$(grep MIHOMO_FALLBACK_VERSION src/version.h | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          echo "mihomo=$MV" >> "$GITHUB_OUTPUT"

      - name: Build PNGwriter from source (not packaged in MSYS2)
        run: |
          git clone --depth 1 https://github.com/pngwriter/pngwriter.git /tmp/pngwriter
          cmake -S /tmp/pngwriter -B /tmp/pngwriter/build \
                -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/clangarm64 \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build /tmp/pngwriter/build -j
          cmake --install /tmp/pngwriter/build

      - name: Build main program
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j

      - name: Assemble distribution
        run: |
          rm -rf dist
          cp -r base dist
          cp build/stairspeedtest.exe dist/
          # CLANGARM64 prefix 是 /clangarm64,所有 DLL 在那
          ldd build/stairspeedtest.exe \
            | awk '{print $3}' | grep -i '^/clangarm64/bin/' | sort -u \
            | xargs -I{} cp {} dist/

      - name: Bundle mihomo kernel
        run: |
          MV=${{ steps.ver.outputs.mihomo }}
          curl -fLO "https://github.com/MetaCubeX/mihomo/releases/download/$MV/mihomo-windows-arm64-$MV.zip"
          unzip -o "mihomo-windows-arm64-$MV.zip" -d mihomo_tmp
          mkdir -p dist/tools/clients
          cp mihomo_tmp/mihomo-windows-arm64*.exe dist/tools/clients/mihomo.exe

      - name: Package
        run: |
          mv dist stairspeedtest
          zip -r stairspeedtest_reborn_win_arm64.zip stairspeedtest

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: stairspeedtest_reborn_win_arm64
          path: stairspeedtest_reborn_win_arm64.zip
          if-no-files-found: error

      - name: Draft Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: stairspeedtest_reborn_win_arm64.zip
          draft: false

  macos_arm64:
    name: macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read mihomo version from version.h
        id: ver
        run: |
          MV=$(grep MIHOMO_FALLBACK_VERSION src/version.h | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          echo "mihomo=$MV" >> "$GITHUB_OUTPUT"

      - name: Install build deps (Homebrew)
        run: |
          brew update
          brew install cmake pkgconf dylibbundler \
            curl openssl@3 yaml-cpp \
            libevent pcre2 rapidjson \
            libpng freetype harfbuzz zlib bzip2

      - name: Build PNGwriter from source (not in Homebrew)
        run: |
          BREW_PREFIX="$(brew --prefix)"
          git clone --depth 1 https://github.com/pngwriter/pngwriter.git /tmp/pngwriter
          cmake -S /tmp/pngwriter -B /tmp/pngwriter/build \
                -DCMAKE_BUILD_TYPE=Release -DCMAKE_FIND_FRAMEWORK=NEVER \
                -DCMAKE_INSTALL_PREFIX="$BREW_PREFIX" \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build /tmp/pngwriter/build -j$(sysctl -n hw.ncpu)
          cmake --install /tmp/pngwriter/build

      - name: Build main program
        run: |
          BREW_PREFIX="$(brew --prefix)"
          export PKG_CONFIG_PATH="$BREW_PREFIX/opt/curl/lib/pkgconfig:$BREW_PREFIX/opt/openssl@3/lib/pkgconfig:$PKG_CONFIG_PATH"
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_PREFIX_PATH="$BREW_PREFIX/opt/curl;$BREW_PREFIX" \
                -DOPENSSL_ROOT_DIR="$BREW_PREFIX/opt/openssl@3"
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Assemble distribution
        run: |
          rm -rf dist
          cp -r base dist
          cp build/stairspeedtest dist/
          # Copy every non-system dylib next to the binary and rewrite the
          # load paths to @executable_path/libs so the bundle is self-contained.
          dylibbundler -od -b -x dist/stairspeedtest -d dist/libs/ -p @executable_path/libs/

      - name: Bundle mihomo kernel
        run: |
          MV=${{ steps.ver.outputs.mihomo }}
          curl -fLO "https://github.com/MetaCubeX/mihomo/releases/download/$MV/mihomo-darwin-arm64-$MV.gz"
          gunzip "mihomo-darwin-arm64-$MV.gz"
          mkdir -p dist/tools/clients
          install -m 0755 "mihomo-darwin-arm64-$MV" dist/tools/clients/mihomo

      - name: Package
        run: |
          mv dist stairspeedtest
          tar czf stairspeedtest_reborn_darwin_arm64.tar.gz stairspeedtest

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: stairspeedtest_reborn_darwin_arm64
          path: stairspeedtest_reborn_darwin_arm64.tar.gz
          if-no-files-found: error

      - name: Draft Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: stairspeedtest_reborn_darwin_arm64.tar.gz
          draft: false

  macos_amd64:
    name: macOS amd64 (Intel)
    # macos-15-intel:GitHub 最后一个 Intel macOS runner,持续到 2027-08。
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v5

      - name: Read mihomo version from version.h
        id: ver
        run: |
          MV=$(grep MIHOMO_FALLBACK_VERSION src/version.h | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          echo "mihomo=$MV" >> "$GITHUB_OUTPUT"

      - name: Install build deps (Homebrew)
        run: |
          brew update
          brew install cmake pkgconf dylibbundler \
            curl openssl@3 yaml-cpp \
            libevent pcre2 rapidjson \
            libpng freetype harfbuzz zlib bzip2

      - name: Build PNGwriter from source (not in Homebrew)
        run: |
          BREW_PREFIX="$(brew --prefix)"
          git clone --depth 1 https://github.com/pngwriter/pngwriter.git /tmp/pngwriter
          cmake -S /tmp/pngwriter -B /tmp/pngwriter/build \
                -DCMAKE_BUILD_TYPE=Release -DCMAKE_FIND_FRAMEWORK=NEVER \
                -DCMAKE_INSTALL_PREFIX="$BREW_PREFIX" \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build /tmp/pngwriter/build -j$(sysctl -n hw.ncpu)
          cmake --install /tmp/pngwriter/build

      - name: Build main program
        run: |
          BREW_PREFIX="$(brew --prefix)"
          export PKG_CONFIG_PATH="$BREW_PREFIX/opt/curl/lib/pkgconfig:$BREW_PREFIX/opt/openssl@3/lib/pkgconfig:$PKG_CONFIG_PATH"
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_PREFIX_PATH="$BREW_PREFIX/opt/curl;$BREW_PREFIX" \
                -DOPENSSL_ROOT_DIR="$BREW_PREFIX/opt/openssl@3"
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Assemble distribution
        run: |
          rm -rf dist
          cp -r base dist
          cp build/stairspeedtest dist/
          dylibbundler -od -b -x dist/stairspeedtest -d dist/libs/ -p @executable_path/libs/

      - name: Bundle mihomo kernel
        run: |
          MV=${{ steps.ver.outputs.mihomo }}
          curl -fLO "https://github.com/MetaCubeX/mihomo/releases/download/$MV/mihomo-darwin-amd64-$MV.gz"
          gunzip "mihomo-darwin-amd64-$MV.gz"
          mkdir -p dist/tools/clients
          install -m 0755 "mihomo-darwin-amd64-$MV" dist/tools/clients/mihomo

      - name: Package
        run: |
          mv dist stairspeedtest
          tar czf stairspeedtest_reborn_darwin_amd64.tar.gz stairspeedtest

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: stairspeedtest_reborn_darwin_amd64
          path: stairspeedtest_reborn_darwin_amd64.tar.gz
          if-no-files-found: error

      - name: Draft Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: stairspeedtest_reborn_darwin_amd64.tar.gz
          draft: false
