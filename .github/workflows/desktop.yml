name: Desktop release build
# Tauri 桌面端 GUI 客户端三平台打包流水线。
# Windows: NSIS 安装包(MSYS2 MinGW64 + libevent 静态/动态)
# macOS arm64: DMG(Homebrew + dylibbundler)
# Linux x64: AppImage + deb + rpm(apt + patchelf,RPATH=$ORIGIN)
#
# 共同流程:
#   1. 编 C++ webserver 引擎(开 BUILD_WEBSERVER_ENGINE=ON,链接 libevent)
#   2. 装配 src-tauri/engine/:引擎可执行文件 + 运行时库 + mihomo + 字体 + 配置模板
#   3. npm run tauri build 出对应平台的安装包
#   4. 推 tag 时挂到同一个 Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  windows_desktop:
    name: Windows desktop (Tauri NSIS)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      # ---------- 1. 用 MSYS2 编 C++ webserver 引擎 ----------
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel git unzip
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-yaml-cpp
            mingw-w64-x86_64-libevent
            mingw-w64-x86_64-pcre2
            mingw-w64-x86_64-rapidjson
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-freetype
            mingw-w64-x86_64-harfbuzz
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-bzip2

      - name: Read mihomo version from version.h
        id: ver
        shell: msys2 {0}
        run: |
          MV=$(grep MIHOMO_FALLBACK_VERSION src/version.h | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          echo "mihomo=$MV" >> "$GITHUB_OUTPUT"

      - name: Build PNGwriter from source
        shell: msys2 {0}
        run: |
          git clone --depth 1 https://github.com/pngwriter/pngwriter.git /tmp/pngwriter
          cmake -S /tmp/pngwriter -B /tmp/pngwriter/build \
                -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/mingw64 \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build /tmp/pngwriter/build -j
          cmake --install /tmp/pngwriter/build

      - name: Build C++ engine with /web mode
        shell: msys2 {0}
        run: |
          # BUILD_WEBSERVER_ENGINE=ON 让 stairspeedtest.exe 同时支持 CLI 与 /web HTTP 服务,
          # Tauri 主进程通过 spawn `stairspeedtest.exe /web` 拉起后端
          cmake -S . -B build \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_WEBSERVER_ENGINE=ON
          cmake --build build -j

      # ---------- 2. 装配 src-tauri/engine/ ----------
      - name: Assemble engine directory
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          ENGINE=separated/desktop/src-tauri/engine
          rm -rf "$ENGINE"
          mkdir -p "$ENGINE/tools/clients" "$ENGINE/tools/misc"

          # 引擎 exe
          cp build/stairspeedtest.exe "$ENGINE/"

          # 链接所需的 DLL(从 mingw64/bin 拷)
          ldd build/stairspeedtest.exe \
            | awk '{print $3}' | grep -i '^/mingw64/bin/' | sort -u \
            | xargs -I{} cp {} "$ENGINE/"

          # 字体(渲染结果图必需)
          cp base/tools/misc/SourceHanSansCN-Medium.otf "$ENGINE/tools/misc/"
          cp base/tools/misc/TwemojiFlat.ttf "$ENGINE/tools/misc/"

          # 运行时配置 + 默认订阅占位(模板)
          cp separated/desktop/engine-assets/config.yaml "$ENGINE/"
          cp separated/desktop/engine-assets/sub_link.txt "$ENGINE/"
          cp base/pref.ini "$ENGINE/"

          # mihomo 内核
          MV=${{ steps.ver.outputs.mihomo }}
          curl -fLO "https://github.com/MetaCubeX/mihomo/releases/download/$MV/mihomo-windows-amd64-$MV.zip"
          unzip -o "mihomo-windows-amd64-$MV.zip" -d /tmp/mihomo
          cp /tmp/mihomo/mihomo-windows-amd64*.exe "$ENGINE/tools/clients/mihomo.exe"

          ls -la "$ENGINE"

      - name: Upload engine for smoke test
        uses: actions/upload-artifact@v4
        with:
          name: engine-windows-x64
          path: separated/desktop/src-tauri/engine/
          retention-days: 14

      # ---------- 3. 前端 + Tauri 打 NSIS ----------
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: separated/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            separated/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-tauri-${{ hashFiles('separated/desktop/src-tauri/Cargo.lock') }}

      - name: Install npm deps
        working-directory: separated/desktop
        run: npm ci

      - name: Tauri build (NSIS)
        working-directory: separated/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      # ---------- 4. 上传产物 ----------
      - name: Locate NSIS installer
        id: locate
        shell: pwsh
        run: |
          $bundleDir = "separated/desktop/src-tauri/target/release/bundle/nsis"
          $exe = Get-ChildItem "$bundleDir/*.exe" | Select-Object -First 1
          $sig = Get-ChildItem "$bundleDir/*.exe.sig" | Select-Object -First 1
          if (-not $exe) { throw "NSIS installer not produced" }
          if (-not $sig) { throw "NSIS installer signature not produced (TAURI_SIGNING_PRIVATE_KEY missing?)" }
          "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          "sig=$($sig.FullName)"  >> $env:GITHUB_OUTPUT
          "name=$($exe.Name)"     >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: node-speedtest-windows-desktop
          path: |
            ${{ steps.locate.outputs.path }}
            ${{ steps.locate.outputs.sig }}
          if-no-files-found: error

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.locate.outputs.path }}
            ${{ steps.locate.outputs.sig }}
          draft: false

  # ============================================================
  # Windows arm64 — NSIS
  # 用 windows-11-arm runner + MSYS2 CLANGARM64 编 C++ 引擎,
  # Rust 走 aarch64-pc-windows-msvc target,Tauri 出 ARM64 NSIS 安装包。
  # ============================================================
  windows_arm64_desktop:
    name: Windows arm64 desktop (Tauri NSIS)
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v5

      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          install: >-
            base-devel git unzip
            mingw-w64-clang-aarch64-clang
            mingw-w64-clang-aarch64-lld
            mingw-w64-clang-aarch64-cmake
            mingw-w64-clang-aarch64-pkgconf
            mingw-w64-clang-aarch64-curl
            mingw-w64-clang-aarch64-openssl
            mingw-w64-clang-aarch64-yaml-cpp
            mingw-w64-clang-aarch64-libevent
            mingw-w64-clang-aarch64-pcre2
            mingw-w64-clang-aarch64-rapidjson
            mingw-w64-clang-aarch64-libpng
            mingw-w64-clang-aarch64-freetype
            mingw-w64-clang-aarch64-harfbuzz
            mingw-w64-clang-aarch64-zlib
            mingw-w64-clang-aarch64-bzip2

      - name: Read mihomo version from version.h
        id: ver
        shell: msys2 {0}
        run: |
          MV=$(grep MIHOMO_FALLBACK_VERSION src/version.h | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          echo "mihomo=$MV" >> "$GITHUB_OUTPUT"

      - name: Build PNGwriter from source
        shell: msys2 {0}
        run: |
          git clone --depth 1 https://github.com/pngwriter/pngwriter.git /tmp/pngwriter
          cmake -S /tmp/pngwriter -B /tmp/pngwriter/build \
                -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/clangarm64 \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build /tmp/pngwriter/build -j
          cmake --install /tmp/pngwriter/build

      - name: Build C++ engine with /web mode
        shell: msys2 {0}
        run: |
          cmake -S . -B build \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_WEBSERVER_ENGINE=ON
          cmake --build build -j

      - name: Assemble engine directory
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          ENGINE=separated/desktop/src-tauri/engine
          rm -rf "$ENGINE"
          mkdir -p "$ENGINE/tools/clients" "$ENGINE/tools/misc"

          cp build/stairspeedtest.exe "$ENGINE/"

          # CLANGARM64 prefix:/clangarm64,所有非系统 DLL 在那
          ldd build/stairspeedtest.exe \
            | awk '{print $3}' | grep -i '^/clangarm64/bin/' | sort -u \
            | xargs -I{} cp {} "$ENGINE/"

          cp base/tools/misc/SourceHanSansCN-Medium.otf "$ENGINE/tools/misc/"
          cp base/tools/misc/TwemojiFlat.ttf "$ENGINE/tools/misc/"

          cp separated/desktop/engine-assets/config.yaml "$ENGINE/"
          cp separated/desktop/engine-assets/sub_link.txt "$ENGINE/"
          cp base/pref.ini "$ENGINE/"

          MV=${{ steps.ver.outputs.mihomo }}
          curl -fLO "https://github.com/MetaCubeX/mihomo/releases/download/$MV/mihomo-windows-arm64-$MV.zip"
          unzip -o "mihomo-windows-arm64-$MV.zip" -d /tmp/mihomo
          cp /tmp/mihomo/mihomo-windows-arm64*.exe "$ENGINE/tools/clients/mihomo.exe"

          ls -la "$ENGINE"

      - name: Upload engine for smoke test
        uses: actions/upload-artifact@v4
        with:
          name: engine-windows-arm64
          path: separated/desktop/src-tauri/engine/
          retention-days: 14

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: separated/desktop/package-lock.json

      # Rust 主进程用 MSVC 工具链(Tauri 在 Windows ARM64 推荐路径),target 显式指定
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            separated/desktop/src-tauri/target
          key: ${{ runner.os }}-arm64-cargo-tauri-${{ hashFiles('separated/desktop/src-tauri/Cargo.lock') }}

      - name: Install npm deps
        working-directory: separated/desktop
        run: npm ci

      - name: Tauri build (NSIS, arm64)
        working-directory: separated/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --target aarch64-pc-windows-msvc

      - name: Locate NSIS installer
        id: locate
        shell: pwsh
        run: |
          $bundleDir = "separated/desktop/src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis"
          $exe = Get-ChildItem "$bundleDir/*.exe" | Select-Object -First 1
          $sig = Get-ChildItem "$bundleDir/*.exe.sig" | Select-Object -First 1
          if (-not $exe) { throw "NSIS installer not produced" }
          if (-not $sig) { throw "NSIS installer signature not produced (TAURI_SIGNING_PRIVATE_KEY missing?)" }
          "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          "sig=$($sig.FullName)"  >> $env:GITHUB_OUTPUT
          "name=$($exe.Name)"     >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: node-speedtest-windows-arm64-desktop
          path: |
            ${{ steps.locate.outputs.path }}
            ${{ steps.locate.outputs.sig }}
          if-no-files-found: error

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.locate.outputs.path }}
            ${{ steps.locate.outputs.sig }}
          draft: false

  # ============================================================
  # macOS arm64 (Apple Silicon) — DMG
  # ============================================================
  macos_desktop:
    name: macOS desktop (Tauri DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install build deps (Homebrew)
        run: |
          brew update
          brew install cmake pkgconf dylibbundler \
            curl openssl@3 yaml-cpp \
            libevent pcre2 rapidjson \
            libpng freetype harfbuzz zlib bzip2

      - name: Read mihomo version from version.h
        id: ver
        run: |
          MV=$(grep MIHOMO_FALLBACK_VERSION src/version.h | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          echo "mihomo=$MV" >> "$GITHUB_OUTPUT"

      - name: Build PNGwriter from source
        run: |
          BREW_PREFIX="$(brew --prefix)"
          git clone --depth 1 https://github.com/pngwriter/pngwriter.git /tmp/pngwriter
          cmake -S /tmp/pngwriter -B /tmp/pngwriter/build \
                -DCMAKE_BUILD_TYPE=Release -DCMAKE_FIND_FRAMEWORK=NEVER \
                -DCMAKE_INSTALL_PREFIX="$BREW_PREFIX" \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build /tmp/pngwriter/build -j$(sysctl -n hw.ncpu)
          cmake --install /tmp/pngwriter/build

      - name: Build C++ engine with /web mode
        run: |
          BREW_PREFIX="$(brew --prefix)"
          export PKG_CONFIG_PATH="$BREW_PREFIX/opt/curl/lib/pkgconfig:$BREW_PREFIX/opt/openssl@3/lib/pkgconfig:$PKG_CONFIG_PATH"
          cmake -S . -B build \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_WEBSERVER_ENGINE=ON \
                -DCMAKE_PREFIX_PATH="$BREW_PREFIX/opt/curl;$BREW_PREFIX" \
                -DOPENSSL_ROOT_DIR="$BREW_PREFIX/opt/openssl@3"
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Assemble engine directory
        run: |
          set -euxo pipefail
          ENGINE=separated/desktop/src-tauri/engine
          rm -rf "$ENGINE"
          mkdir -p "$ENGINE/tools/clients" "$ENGINE/tools/misc" "$ENGINE/libs"

          cp build/stairspeedtest "$ENGINE/"
          # 把 engine/stairspeedtest 自带依赖的 dylib 全部拷贝到 engine/libs/,
          # 并把它的 LC_LOAD_DYLIB 改写为 @executable_path/libs/...,跨机也能跑
          dylibbundler -od -b -x "$ENGINE/stairspeedtest" -d "$ENGINE/libs/" -p @executable_path/libs/

          cp base/tools/misc/SourceHanSansCN-Medium.otf "$ENGINE/tools/misc/"
          cp base/tools/misc/TwemojiFlat.ttf "$ENGINE/tools/misc/"
          cp separated/desktop/engine-assets/config.yaml "$ENGINE/"
          cp separated/desktop/engine-assets/sub_link.txt "$ENGINE/"
          cp base/pref.ini "$ENGINE/"

          MV=${{ steps.ver.outputs.mihomo }}
          curl -fLO "https://github.com/MetaCubeX/mihomo/releases/download/$MV/mihomo-darwin-arm64-$MV.gz"
          gunzip "mihomo-darwin-arm64-$MV.gz"
          install -m 0755 "mihomo-darwin-arm64-$MV" "$ENGINE/tools/clients/mihomo"

          ls -la "$ENGINE"

      - name: Upload engine for smoke test
        uses: actions/upload-artifact@v4
        with:
          name: engine-darwin-arm64
          path: separated/desktop/src-tauri/engine/
          retention-days: 14

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: separated/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            separated/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-tauri-${{ hashFiles('separated/desktop/src-tauri/Cargo.lock') }}

      - name: Install npm deps
        working-directory: separated/desktop
        run: npm ci

      - name: Tauri build (DMG + .app updater bundle)
        working-directory: separated/desktop
        # 用 --bundles app dmg 覆盖 tauri.conf.json 里的 nsis(macOS 下 NSIS 不存在)
        # app:tauri-plugin-updater 需要的 .app.tar.gz tarball 自动产物
        # dmg:用户首次手动下载安装用
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --bundles app dmg

      - name: Locate macOS bundles
        id: locate
        run: |
          set -e
          BUNDLE=separated/desktop/src-tauri/target/release/bundle
          DMG=$(find "$BUNDLE/dmg" -name '*.dmg' | head -n 1)
          TARGZ=$(find "$BUNDLE/macos" -name '*.app.tar.gz' | head -n 1)
          SIG=$(find "$BUNDLE/macos" -name '*.app.tar.gz.sig' | head -n 1)
          [ -n "$DMG" ] || { echo "DMG not produced"; exit 1; }
          [ -n "$TARGZ" ] || { echo ".app.tar.gz not produced"; exit 1; }
          [ -n "$SIG" ] || { echo ".app.tar.gz.sig not produced (signing key missing?)"; exit 1; }
          # Tauri 默认 .app.tar.gz 文件名不带版本/架构,两个 macOS job 同名会互相覆盖。
          # 改名带 _0.1.x_aarch64 后缀,与 windows/linux 资产命名风格一致,同时让
          # publish_updater_manifest 能用确定的文件名读到对应签名。
          VERSION=$(jq -r .version separated/desktop/src-tauri/tauri.conf.json)
          NEW_TARGZ_DIR=$(dirname "$TARGZ")
          NEW_TARGZ="$NEW_TARGZ_DIR/Node Speedtest_${VERSION}_aarch64.app.tar.gz"
          NEW_SIG="${NEW_TARGZ}.sig"
          mv "$TARGZ" "$NEW_TARGZ"
          mv "$SIG" "$NEW_SIG"
          {
            echo "dmg=$DMG"
            echo "targz=$NEW_TARGZ"
            echo "sig=$NEW_SIG"
          } >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: node-speedtest-macos-desktop
          path: |
            ${{ steps.locate.outputs.dmg }}
            ${{ steps.locate.outputs.targz }}
            ${{ steps.locate.outputs.sig }}
          if-no-files-found: error

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.locate.outputs.dmg }}
            ${{ steps.locate.outputs.targz }}
            ${{ steps.locate.outputs.sig }}
          draft: false

  # ============================================================
  # macOS amd64 (Intel) — DMG
  # macos-15-intel:GitHub 最后的 Intel macOS runner,持续到 2027-08
  # ============================================================
  macos_intel_desktop:
    name: macOS Intel desktop (Tauri DMG)
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v5

      - name: Install build deps (Homebrew)
        run: |
          brew update
          brew install cmake pkgconf dylibbundler \
            curl openssl@3 yaml-cpp \
            libevent pcre2 rapidjson \
            libpng freetype harfbuzz zlib bzip2

      - name: Read mihomo version from version.h
        id: ver
        run: |
          MV=$(grep MIHOMO_FALLBACK_VERSION src/version.h | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          echo "mihomo=$MV" >> "$GITHUB_OUTPUT"

      - name: Build PNGwriter from source
        run: |
          BREW_PREFIX="$(brew --prefix)"
          git clone --depth 1 https://github.com/pngwriter/pngwriter.git /tmp/pngwriter
          cmake -S /tmp/pngwriter -B /tmp/pngwriter/build \
                -DCMAKE_BUILD_TYPE=Release -DCMAKE_FIND_FRAMEWORK=NEVER \
                -DCMAKE_INSTALL_PREFIX="$BREW_PREFIX" \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build /tmp/pngwriter/build -j$(sysctl -n hw.ncpu)
          cmake --install /tmp/pngwriter/build

      - name: Build C++ engine with /web mode
        run: |
          BREW_PREFIX="$(brew --prefix)"
          export PKG_CONFIG_PATH="$BREW_PREFIX/opt/curl/lib/pkgconfig:$BREW_PREFIX/opt/openssl@3/lib/pkgconfig:$PKG_CONFIG_PATH"
          cmake -S . -B build \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_WEBSERVER_ENGINE=ON \
                -DCMAKE_PREFIX_PATH="$BREW_PREFIX/opt/curl;$BREW_PREFIX" \
                -DOPENSSL_ROOT_DIR="$BREW_PREFIX/opt/openssl@3"
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Assemble engine directory
        run: |
          set -euxo pipefail
          ENGINE=separated/desktop/src-tauri/engine
          rm -rf "$ENGINE"
          mkdir -p "$ENGINE/tools/clients" "$ENGINE/tools/misc" "$ENGINE/libs"

          cp build/stairspeedtest "$ENGINE/"
          dylibbundler -od -b -x "$ENGINE/stairspeedtest" -d "$ENGINE/libs/" -p @executable_path/libs/

          cp base/tools/misc/SourceHanSansCN-Medium.otf "$ENGINE/tools/misc/"
          cp base/tools/misc/TwemojiFlat.ttf "$ENGINE/tools/misc/"
          cp separated/desktop/engine-assets/config.yaml "$ENGINE/"
          cp separated/desktop/engine-assets/sub_link.txt "$ENGINE/"
          cp base/pref.ini "$ENGINE/"

          MV=${{ steps.ver.outputs.mihomo }}
          curl -fLO "https://github.com/MetaCubeX/mihomo/releases/download/$MV/mihomo-darwin-amd64-$MV.gz"
          gunzip "mihomo-darwin-amd64-$MV.gz"
          install -m 0755 "mihomo-darwin-amd64-$MV" "$ENGINE/tools/clients/mihomo"

          ls -la "$ENGINE"

      - name: Upload engine for smoke test
        uses: actions/upload-artifact@v4
        with:
          name: engine-darwin-amd64
          path: separated/desktop/src-tauri/engine/
          retention-days: 14

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: separated/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            separated/desktop/src-tauri/target
          key: ${{ runner.os }}-intel-cargo-tauri-${{ hashFiles('separated/desktop/src-tauri/Cargo.lock') }}

      - name: Install npm deps
        working-directory: separated/desktop
        run: npm ci

      - name: Tauri build (DMG + .app updater bundle, x86_64)
        working-directory: separated/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --bundles app dmg --target x86_64-apple-darwin

      - name: Locate macOS bundles
        id: locate
        run: |
          set -e
          BUNDLE=separated/desktop/src-tauri/target/x86_64-apple-darwin/release/bundle
          DMG=$(find "$BUNDLE/dmg" -name '*.dmg' | head -n 1)
          TARGZ=$(find "$BUNDLE/macos" -name '*.app.tar.gz' | head -n 1)
          SIG=$(find "$BUNDLE/macos" -name '*.app.tar.gz.sig' | head -n 1)
          [ -n "$DMG" ] || { echo "DMG not produced"; exit 1; }
          [ -n "$TARGZ" ] || { echo ".app.tar.gz not produced"; exit 1; }
          [ -n "$SIG" ] || { echo ".app.tar.gz.sig not produced (signing key missing?)"; exit 1; }
          # Tauri 默认 .app.tar.gz 文件名不带版本/架构,与另一个 macOS arm64 job 同名会互相覆盖。
          # 改名带 _0.1.x_x64 后缀,与 windows/linux 资产命名风格一致,同时让
          # publish_updater_manifest 能用确定的文件名读到对应签名。
          VERSION=$(jq -r .version separated/desktop/src-tauri/tauri.conf.json)
          NEW_TARGZ_DIR=$(dirname "$TARGZ")
          NEW_TARGZ="$NEW_TARGZ_DIR/Node Speedtest_${VERSION}_x64.app.tar.gz"
          NEW_SIG="${NEW_TARGZ}.sig"
          mv "$TARGZ" "$NEW_TARGZ"
          mv "$SIG" "$NEW_SIG"
          {
            echo "dmg=$DMG"
            echo "targz=$NEW_TARGZ"
            echo "sig=$NEW_SIG"
          } >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: node-speedtest-macos-intel-desktop
          path: |
            ${{ steps.locate.outputs.dmg }}
            ${{ steps.locate.outputs.targz }}
            ${{ steps.locate.outputs.sig }}
          if-no-files-found: error

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.locate.outputs.dmg }}
            ${{ steps.locate.outputs.targz }}
            ${{ steps.locate.outputs.sig }}
          draft: false

  # ============================================================
  # Linux x86_64 — AppImage + deb + rpm
  # ============================================================
  linux_desktop:
    name: Linux desktop (Tauri AppImage + deb + rpm)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install build deps (apt)
        run: |
          sudo apt-get update
          # Tauri 2 需要的 GUI 系统库
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            file
          # C++ 引擎需要的开发包
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libcurl4-openssl-dev libssl-dev libyaml-cpp-dev \
            libevent-dev libpcre2-dev rapidjson-dev \
            libpng-dev libfreetype-dev libharfbuzz-dev zlib1g-dev libbz2-dev

      - name: Read mihomo version from version.h
        id: ver
        run: |
          MV=$(grep MIHOMO_FALLBACK_VERSION src/version.h | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          echo "mihomo=$MV" >> "$GITHUB_OUTPUT"

      - name: Build PNGwriter from source
        run: |
          git clone --depth 1 https://github.com/pngwriter/pngwriter.git /tmp/pngwriter
          cmake -S /tmp/pngwriter -B /tmp/pngwriter/build \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr/local \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build /tmp/pngwriter/build -j$(nproc)
          sudo cmake --install /tmp/pngwriter/build

      - name: Build C++ engine with /web mode
        run: |
          cmake -S . -B build \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_WEBSERVER_ENGINE=ON
          cmake --build build -j$(nproc)

      - name: Assemble engine directory
        run: |
          set -euxo pipefail
          ENGINE=separated/desktop/src-tauri/engine
          rm -rf "$ENGINE"
          mkdir -p "$ENGINE/tools/clients" "$ENGINE/tools/misc"

          cp build/stairspeedtest "$ENGINE/"
          chmod +x "$ENGINE/stairspeedtest"

          # 黑名单:glibc 内核 + 系统 GUI/图形/IPC 栈必须用系统的,其余全捆进 engine/。
          SYS_LIB_RE='/(ld-linux[^/]*|libc|libm|libdl|libpthread|librt|libresolv|libnsl|libutil|libgcc_s|libstdc\+\+|libwayland-[a-z]+|libX[0-9A-Za-z]+|libxcb[^/]*|libxkb[^/]*|libdrm|libEGL|libGL|libOpenGL|libgbm|libgl[a-z]*|libgtk-3|libgdk-3|libgdk_pixbuf-2|libwebkit2gtk-[0-9.]+|libjavascriptcoregtk-[0-9.]+|libsoup-[0-9.]+|libpango[^/]*|libcairo[^/]*|libatk[^/]*|libepoxy|libglib-2|libgobject-2|libgio-2|libgmodule-2|libgthread-2|libdbus-1|libsystemd|libselinux|libudev)\.so'

          mapfile -t BUNDLE_LIBS < <(
            ldd "$ENGINE/stairspeedtest" \
              | awk '/=> \// {print $3}' \
              | grep -Ev "$SYS_LIB_RE" \
              | sort -u
          )
          echo "Bundling ${#BUNDLE_LIBS[@]} runtime libs into engine/:"
          printf '  %s\n' "${BUNDLE_LIBS[@]}"
          cp -L -t "$ENGINE/" "${BUNDLE_LIBS[@]}"

          # 二级依赖(libfreetype dlopen libpng 等)也走 $ORIGIN。
          patchelf --set-rpath '$ORIGIN' "$ENGINE/stairspeedtest"
          for so in "$ENGINE"/*.so*; do
            [ -f "$so" ] && [ ! -L "$so" ] && patchelf --set-rpath '$ORIGIN' "$so" || true
          done

          cp base/tools/misc/SourceHanSansCN-Medium.otf "$ENGINE/tools/misc/"
          cp base/tools/misc/TwemojiFlat.ttf "$ENGINE/tools/misc/"
          cp separated/desktop/engine-assets/config.yaml "$ENGINE/"
          cp separated/desktop/engine-assets/sub_link.txt "$ENGINE/"
          cp base/pref.ini "$ENGINE/"

          MV=${{ steps.ver.outputs.mihomo }}
          curl -fLO "https://github.com/MetaCubeX/mihomo/releases/download/$MV/mihomo-linux-amd64-$MV.gz"
          gunzip "mihomo-linux-amd64-$MV.gz"
          install -m 0755 "mihomo-linux-amd64-$MV" "$ENGINE/tools/clients/mihomo"

          ls -la "$ENGINE"
          file "$ENGINE/stairspeedtest"

      - name: Upload engine for smoke test
        uses: actions/upload-artifact@v4
        with:
          name: engine-linux-x64
          path: separated/desktop/src-tauri/engine/
          retention-days: 14

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: separated/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            separated/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-tauri-${{ hashFiles('separated/desktop/src-tauri/Cargo.lock') }}

      - name: Install npm deps
        working-directory: separated/desktop
        run: npm ci

      - name: Tauri build (AppImage + deb + rpm)
        working-directory: separated/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --bundles appimage deb rpm

      - name: Locate Linux bundles
        id: locate
        run: |
          set -e
          BUNDLE=separated/desktop/src-tauri/target/release/bundle
          APPIMAGE=$(find "$BUNDLE/appimage" -name '*.AppImage' 2>/dev/null | head -n 1)
          APPIMAGE_SIG=$(find "$BUNDLE/appimage" -name '*.AppImage.sig' 2>/dev/null | head -n 1)
          DEB=$(find "$BUNDLE/deb" -name '*.deb' 2>/dev/null | head -n 1)
          RPM=$(find "$BUNDLE/rpm" -name '*.rpm' 2>/dev/null | head -n 1)
          [ -n "$APPIMAGE" ] || { echo "AppImage not produced"; exit 1; }
          [ -n "$APPIMAGE_SIG" ] || { echo "AppImage.sig not produced (signing key missing?)"; exit 1; }
          [ -n "$DEB" ] || { echo "deb not produced"; exit 1; }
          [ -n "$RPM" ] || { echo "rpm not produced"; exit 1; }
          {
            echo "appimage=$APPIMAGE"
            echo "appimage_sig=$APPIMAGE_SIG"
            echo "deb=$DEB"
            echo "rpm=$RPM"
          } >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: node-speedtest-linux-desktop
          path: |
            ${{ steps.locate.outputs.appimage }}
            ${{ steps.locate.outputs.appimage_sig }}
            ${{ steps.locate.outputs.deb }}
            ${{ steps.locate.outputs.rpm }}
          if-no-files-found: error

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.locate.outputs.appimage }}
            ${{ steps.locate.outputs.appimage_sig }}
            ${{ steps.locate.outputs.deb }}
            ${{ steps.locate.outputs.rpm }}
          draft: false


  # ============================================================
