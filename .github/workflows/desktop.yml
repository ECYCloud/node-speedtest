  # ============================================================
  # publish_updater_manifest
  # 等所有 6 个 desktop job 完成,从 release 读出所有 .sig,
  # 拼出 tauri-plugin-updater 用的 latest.json 上传到同一 release。
  # 客户端 endpoint = .../releases/latest/download/latest.json
  # ============================================================
  publish_updater_manifest:
    name: Publish updater manifest (latest.json)
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - windows_desktop
      - windows_arm64_desktop
      - macos_desktop
      - macos_intel_desktop
      - linux_desktop
      - linux_arm64_desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Build latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p _updater
          cd _updater

          # release tag 形如 v0.1.2,latest.json 里 version 不带 v 前缀
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # 下载本次 release 的所有 .sig 资产到当前目录。
          # GitHub release 把上传时文件名里的空格在 web 显示和 download 时统一替换为 ".",
          # 所以 gh download 拉到本地的 .sig 文件名是 "Node.Speedtest_x.y.z_*.sig"。
          gh release download "$TAG" --repo "$REPO" --pattern '*.sig' --dir .

          base="https://github.com/$REPO/releases/download/$TAG"

          # 平台键(Tauri updater 约定)→ 资产 basename(以 GitHub 实际存储/下载的形态:点替代空格)
          # 各 desktop job 已把 macOS .app.tar.gz 显式改名带架构后缀,避免 arm64/x64 同名互相覆盖
          win_x64_exe="Node.Speedtest_${VERSION}_x64-setup.exe"
          win_a64_exe="Node.Speedtest_${VERSION}_arm64-setup.exe"
          mac_x64_tgz="Node.Speedtest_${VERSION}_x64.app.tar.gz"
          mac_a64_tgz="Node.Speedtest_${VERSION}_aarch64.app.tar.gz"
          lin_x64_app="Node.Speedtest_${VERSION}_amd64.AppImage"
          lin_a64_app="Node.Speedtest_${VERSION}_aarch64.AppImage"

          read_sig() {
            local f="$1"
            if [ ! -f "$f" ]; then
              echo "::error::missing signature file: $f" >&2
              exit 1
            fi
            cat "$f"
          }

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg notes "See release notes at https://github.com/$REPO/releases/tag/$TAG" \
            --arg win_x64_url "$base/$win_x64_exe" \
            --arg win_x64_sig "$(read_sig "${win_x64_exe}.sig")" \
            --arg win_a64_url "$base/$win_a64_exe" \
            --arg win_a64_sig "$(read_sig "${win_a64_exe}.sig")" \
            --arg mac_x64_url "$base/$mac_x64_tgz" \
            --arg mac_x64_sig "$(read_sig "${mac_x64_tgz}.sig")" \
            --arg mac_a64_url "$base/$mac_a64_tgz" \
            --arg mac_a64_sig "$(read_sig "${mac_a64_tgz}.sig")" \
            --arg lin_x64_url "$base/$lin_x64_app" \
            --arg lin_x64_sig "$(read_sig "${lin_x64_app}.sig")" \
            --arg lin_a64_url "$base/$lin_a64_app" \
            --arg lin_a64_sig "$(read_sig "${lin_a64_app}.sig")" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64":  { signature: $win_x64_sig, url: $win_x64_url },
                "windows-aarch64": { signature: $win_a64_sig, url: $win_a64_url },
                "darwin-x86_64":   { signature: $mac_x64_sig, url: $mac_x64_url },
                "darwin-aarch64":  { signature: $mac_a64_sig, url: $mac_a64_url },
                "linux-x86_64":    { signature: $lin_x64_sig, url: $lin_x64_url },
                "linux-aarch64":   { signature: $lin_a64_sig, url: $lin_a64_url }
              }
            }' > latest.json

          echo '--- latest.json ---'
          cat latest.json

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release upload "$TAG" _updater/latest.json --repo "$REPO" --clobber
