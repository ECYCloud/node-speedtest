name: Smoke test (real hardware)
# 在 GitHub 提供的对应 CPU 架构 runner 上消费 desktop release build 产出的
# webserver engine artifact,做端到端 5 阶段验证。
#
# 验证内容(每个新平台):
#   1. 引擎进程能在该 CPU 架构上启动(PE/ELF/Mach-O 加载、动态库全解析)
#   2. libevent HTTP 服务能监听 127.0.0.1:10870
#   3. /getversion 返回引擎版本(JSON 序列化、文件 IO)
#   4. /readsubscriptions 解析订阅(订阅链接走 SMOKE_TEST_SUB_URL secret)
#   5. mihomo 内核能在该架构上拉起,outbound config 写入成功
#   6. /start TCP_PING 模式真实测速,至少 1 个节点延迟非 0
#      → 证明 mihomo 在新架构上协议栈完全工作
#
# 触发:
#   - 手动 dispatch(默认从最新成功 desktop run 拉 artifact)
#   - tag push 后 desktop release build 完成时自动跑(workflow_run)

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Desktop release build 的 run id(留空=自动取最新成功 run)'
        required: false
        default: ''
  workflow_run:
    workflows: ['Desktop release build']
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  smoke:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: 'Linux x86_64'
            runner: ubuntu-latest
            artifact: engine-linux-x64
            exe: stairspeedtest
            py: python3
          - label: 'Linux arm64'
            runner: ubuntu-22.04-arm
            artifact: engine-linux-arm64
            exe: stairspeedtest
            py: python3
          - label: 'Windows x86_64'
            runner: windows-latest
            artifact: engine-windows-x64
            exe: stairspeedtest.exe
            py: python
          - label: 'Windows arm64'
            runner: windows-11-arm
            artifact: engine-windows-arm64
            exe: stairspeedtest.exe
            py: python
          - label: 'macOS arm64 (Apple Silicon)'
            runner: macos-latest
            artifact: engine-darwin-arm64
            exe: stairspeedtest
            py: python3
          - label: 'macOS amd64 (Intel)'
            runner: macos-15-intel
            artifact: engine-darwin-amd64
            exe: stairspeedtest
            py: python3
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            scripts/smoke-test
          sparse-checkout-cone-mode: false

      - name: Resolve source desktop run
        id: src
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RUN_ID: ${{ inputs.run_id }}
          WF_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            RID="$WF_RUN_ID"
          elif [ -n "$INPUT_RUN_ID" ]; then
            RID="$INPUT_RUN_ID"
          else
            RID=$(gh run list --workflow="Desktop release build" --status success --limit 1 \
                  --json databaseId --jq '.[0].databaseId' --repo "$GITHUB_REPOSITORY")
          fi
          [ -n "$RID" ] || { echo "找不到可用的 desktop run"; exit 1; }
          echo "run_id=$RID" >> "$GITHUB_OUTPUT"
          echo "Source desktop run: $RID"

      - name: Download engine artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: engine
          github-token: ${{ github.token }}
          run-id: ${{ steps.src.outputs.run_id }}

      - name: Make executable
        run: |
          ls -la engine/
          chmod +x "engine/${{ matrix.exe }}" || true
          chmod +x engine/tools/clients/mihomo* 2>/dev/null || true

      - name: Run smoke test
        env:
          SUB_URL: ${{ secrets.SMOKE_TEST_SUB_URL }}
          EXE: engine/${{ matrix.exe }}
          PY: ${{ matrix.py }}
        run: bash scripts/smoke-test/run.sh

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs-${{ matrix.label }}
          path: |
            engine/logs/**
            engine/engine_stdout.log
            engine/engine_stderr.log
            engine/results/**
            engine/sub_resp.json
            engine/results.json
          if-no-files-found: warn
          retention-days: 14