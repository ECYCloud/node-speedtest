<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 外环主渐变:左紫 → 右蓝(参考图核心配色) -->
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="0.2">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="0.45" stop-color="#8B7CF6"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <!-- 内表盘:近白渐变 -->
    <linearGradient id="dialGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F5F9"/>
    </linearGradient>
    <!-- 指针渐变 -->
    <linearGradient id="needleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E40AF"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <!-- 底部蓝条渐变 -->
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#93C5FD"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="needleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- 半圆主体:中心 (512, 720),外半径 460,内半径 380 -->
  <path d="M 52 720 A 460 460 0 0 1 972 720 L 972 760 L 52 760 Z"
        fill="url(#ringGrad)"/>
  <path d="M 132 720 A 380 380 0 0 1 892 720 L 892 760 L 132 760 Z"
        fill="url(#dialGrad)"/>

  <!-- 9 根刻度,圆角短矩形 -->
  <g fill="#334155">
    <rect x="160" y="708" width="65" height="22" rx="6"/>
    <rect x="-27" y="-10" width="55" height="20" rx="5" transform="translate(184 583) rotate(22.5)"/>
    <rect x="-25" y="-10" width="50" height="20" rx="5" transform="translate(264 472) rotate(45)"/>
    <rect x="-22" y="-10" width="45" height="20" rx="5" transform="translate(379 392) rotate(67.5)"/>
    <rect x="490" y="350" width="44" height="62" rx="8"/>
    <rect x="-22" y="-10" width="45" height="20" rx="5" transform="translate(645 392) rotate(112.5)"/>
    <rect x="-25" y="-10" width="50" height="20" rx="5" transform="translate(760 472) rotate(135)"/>
    <rect x="-27" y="-10" width="55" height="20" rx="5" transform="translate(840 583) rotate(157.5)"/>
    <rect x="799" y="708" width="65" height="22" rx="6"/>
  </g>

  <!-- 指针光晕 -->
  <g filter="url(#needleGlow)" opacity="0.55">
    <path d="M 512 720 L 850 530 L 870 555 L 530 745 Z" fill="#60A5FA"/>
  </g>
  <!-- 主指针 -->
  <path d="M 512 720 L 850 530 L 855 545 L 525 740 Z" fill="url(#needleGrad)"/>
  <!-- 指针尖端高亮 -->
  <line x1="838" y1="528" x2="868" y2="540"
        stroke="#93C5FD" stroke-width="6" stroke-linecap="round"/>

  <!-- 中央旋钮:外白 + 内深 + 高光小点 -->
  <circle cx="512" cy="720" r="56" fill="#FFFFFF"/>
  <circle cx="512" cy="720" r="56" fill="none" stroke="#E2E8F0" stroke-width="3"/>
  <circle cx="512" cy="720" r="36" fill="#1E293B"/>
  <circle cx="500" cy="708" r="8" fill="#475569" opacity="0.7"/>

  <!-- 底部蓝色矩形读数条 -->
  <rect x="380" y="788" width="280" height="22" rx="11" fill="url(#barGrad)"/>
</svg>
