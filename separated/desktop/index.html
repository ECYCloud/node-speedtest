<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Node Speedtest</title>
    <script>
      // 主题预设:必须在 React 挂载前同步执行,这样 body 第一帧就是最终主题色,
      // 不会出现"白色 → 紫色 splash → 深色界面"的多段闪烁。
      // 与 src/store/theme.ts 用同一个 localStorage key。
      (function () {
        try {
          var saved = localStorage.getItem("ssr-desktop-theme");
          var dark =
            saved === "dark" ||
            (!saved &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {
          /* localStorage 不可用就走默认浅色 */
        }
      })();
    </script>
    <style>
      /* 启动期(webview 加载 dist + 后端 sidecar 拉起)直接显示主题背景色,
         不再叠加 splash overlay — 配合 tauri.conf.json 的 visible:false,
         窗口直到 React 第一次渲染完成才会显示,杜绝多窗口闪烁。 */
      html, body { margin: 0; height: 100%; }
      body {
        background: #f8fafc;
        font-family: "Inter", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
        color: #0f172a;
      }
      html.dark body {
        background: #090d18;
        color: #e2e8f0;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
